name: IaC Security Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'policies/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'policies/**'
  workflow_dispatch:

env:
  TF_VERSION: '1.6.0'

jobs:
  # ==========================================
  # Checkov - CIS Benchmark Scanning
  # ==========================================
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrew/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false
          skip_check: ''

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ==========================================
  # tfsec - Terraform Security Scanning
  # ==========================================
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: false
          format: sarif
          sarif_file: tfsec-results.sarif

      - name: Upload tfsec results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

  # ==========================================
  # OPA - Custom Policy Evaluation
  # ==========================================
  opa:
    name: OPA Policy Evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init -backend=false

      - name: Terraform Plan
        working-directory: terraform/
        run: terraform plan -out=tfplan
        env:
          TF_VAR_db_password: "dummy-for-ci"

      - name: Convert Plan to JSON
        working-directory: terraform/
        run: terraform show -json tfplan > tfplan.json

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA Policies
        run: |
          echo "Running OPA policy evaluation..."

          # Run each policy and collect results
          FAILED=0

          for policy in policies/opa/*.rego; do
            echo "Evaluating: $policy"
            RESULT=$(opa eval --data "$policy" --input terraform/tfplan.json "data.terraform" --format json)

            # Check for deny rules
            DENIES=$(echo "$RESULT" | jq -r '.. | .deny? // empty | .[]' 2>/dev/null)
            if [ -n "$DENIES" ]; then
              echo "::error::Policy violations found in $policy"
              echo "$DENIES"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "All OPA policies passed!"

  # ==========================================
  # Terraform Validate
  # ==========================================
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform/
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/
        run: terraform validate

  # ==========================================
  # Security Summary
  # ==========================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [checkov, tfsec, opa, validate]
    if: always()

    steps:
      - name: Create Summary
        run: |
          echo "## IaC Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | ${{ needs.checkov.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tfsec | ${{ needs.tfsec.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Policies | ${{ needs.opa.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Validate | ${{ needs.validate.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
