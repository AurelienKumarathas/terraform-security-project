# Checkov configuration for QuantumTrade IaC
# Skips are documented false positives only — every skip has a justification

skip-check:
  # CKV_AWS_135: EBS optimisation — t3.medium enables this by default.
  # Checkov does not account for instance types with native EBS optimisation.
  - CKV_AWS_135

  # CKV2_AWS_6: S3 public access block — enforced inside the s3 module
  # via aws_s3_bucket_public_access_block. Checkov occasionally misses
  # resource-level blocks when scanning at the module call site.
  - CKV2_AWS_6

download-external-modules: false
